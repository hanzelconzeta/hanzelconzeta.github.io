<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANZEL | poema complejo acerca del alma</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Roboto+Slab:wght@300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --ultravioleta-cosmico:#0B0014;
      --bugambilia-neon:#C13BFF;
      --rosa-electrico:#FF2E98;
      --naranja-volcanico:#FF4F00;
      --verde-acido:#00FF99;
      --turquesa-cenote:#00F0FF;
      --dorado-luznegra:#FFD700;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; overflow-x:hidden; }
    body {
      background:var(--ultravioleta-cosmico);
      color:var(--dorado-luznegra);
      font-family:'Roboto Slab',serif;
      height:100vh;
      overflow:hidden;
      position:relative;
      cursor:none;
    }

    /* ==================== PALETAS ==================== */
    body.palette-amoriv {
      --ultravioleta-cosmico: #0A00CC;
      --bugambilia-neon: #FF1E1E;
      --rosa-electrico: #FF4D4D;
      --naranja-volcanico: #FF6B6B;
      --verde-acido: #B0FF99;
      --turquesa-cenote: #7FFFFF;
      --dorado-luznegra: #FFEEEE;
    }
    body.palette-esporas {
      --ultravioleta-cosmico: #FF5A1F;
      --bugambilia-neon: #FFEB9E;
      --rosa-electrico: #FF9A6B;
      --naranja-volcanico: #FF8A3D;
      --verde-acido: #FFEBCC;
      --turquesa-cenote: #FFE6C7;
      --dorado-luznegra: #FFF5E6;
    }
    body.palette-16rosas { 
      --ultravioleta-cosmico: #63010E; 
      --bugambilia-neon: #FCD4D4; 
      --rosa-electrico: #FF4500; 
      --verde-acido: #F5F5F5; 
      --turquesa-cenote: #FF69B4; 
      --dorado-luznegra: #F5F5F5; 
    }
    body.palette-kantoamere { 
      --ultravioleta-cosmico: #4A0E2A; 
      --bugambilia-neon: #A8C0FF; 
      --rosa-electrico: #FF69B4; 
      --verde-acido: #B0FF99; 
      --turquesa-cenote: #99F0FF; 
      --dorado-luznegra: #F5E0FF; 
    }
    body.palette-zlooshee { 
      --ultravioleta-cosmico: #0A1F3D; 
      --bugambilia-neon: #00FFCC; 
      --rosa-electrico: #FF00FF; 
      --naranja-volcanico: #FF4500; 
      --verde-acido: #00FF7F; 
      --turquesa-cenote: #40E0D0; 
      --dorado-luznegra: #FFD700; 
    }
    body.palette-petite { 
      --ultravioleta-cosmico: #00D4FF; 
      --bugambilia-neon: #FF0088; 
      --rosa-electrico: #FF2EB8; 
      --verde-acido: #B0FFEE; 
      --turquesa-cenote: #00FFFF; 
      --dorado-luznegra: #E0FFFF; 
    }
    body.palette-cementerio {
      --ultravioleta-cosmico: #0A0018;
      --bugambilia-neon: #39FF14;
      --rosa-electrico: #1EFF7A;
      --naranja-volcanico: #00CC66;
      --verde-acido: #A5FF4D;
      --turquesa-cenote: #14FF9F;
      --dorado-luznegra: #E0FFE6;
    }

    .cursor {
      position:fixed; width:15px; height:15px; border-radius:50%; pointer-events:none;
      transform:translate(-50%,-50%); mix-blend-mode:screen; z-index:9999;
      transition:all .1s; animation:colorShift 3s infinite alternate;
      box-shadow:0 0 20px rgba(57,255,20,0.9);
    }
    @media (pointer: coarse) { .cursor { display:none; } body { cursor: auto; } }
    @keyframes colorShift {
      0%{background:#39FF14} 30%{background:#7FFF4D} 60%{background:#B5FF99} 100%{background:#E0FFE6}
    }

    .intro {
      position:relative; z-index:10; text-align:center; display:flex; flex-direction:column;
      align-items:center; justify-content:center; height:100vh; width:100%;
    }
    .hanzel-logo {
      font-family:'Cinzel',serif;
      font-size: clamp(4rem, 15vw, 10rem);
      letter-spacing: clamp(4px, 2vw, 12px);
      margin-bottom:1rem; white-space: nowrap;
      z-index: 8;
    }
    .hanzel-logo span {
      background:linear-gradient(90deg,var(--bugambilia-neon),var(--rosa-electrico),var(--naranja-volcanico));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:glow 1.6s infinite alternate, float 6s infinite;
    }
    @keyframes glow { from{text-shadow:0 0 30px var(--dorado-luznegra),0 0 55px var(--bugambilia-neon)} to{text-shadow:0 0 45px var(--dorado-luznegra),0 0 90px var(--bugambilia-neon)} }
    @keyframes float { 0%,100%{transform:translateY(0)scale(1)} 50%{transform:translateY(-8px)scale(1.02)} }

    .lava-container { position:absolute; inset:0; filter:url(#goo); pointer-events:none; z-index:12; }
    .blob {
      position:absolute; width:220px; height:220px; border-radius:50%;
      background:var(--bugambilia-neon); opacity:0.88;
      animation:lava-move 40s infinite ease-in-out alternate;
      box-shadow: 0 0 55px var(--bugambilia-neon);
    }
    @keyframes lava-move {
      0%{transform:translateY(0)scale(1)rotate(0)}
      50%{transform:translateY(-120vh)scale(2.5)rotate(90deg)}
      100%{transform:translateY(0)scale(1)rotate(0)}
    }
    .blob:nth-child(1){left:5%; bottom:-100px; animation-duration:35s; width:180px; height:180px;}
    .blob:nth-child(2){left:15%; bottom:-150px; animation-duration:42s; animation-delay:5s;}
    .blob:nth-child(3){left:25%; bottom:-200px; animation-duration:38s; animation-delay:10s; width:260px; height:260px;}
    .blob:nth-child(4){left:35%; bottom:-120px; animation-duration:45s; animation-delay:15s;}
    .blob:nth-child(5){left:45%; bottom:-180px; animation-duration:40s; animation-delay:3s; width:190px; height:190px;}
    .blob:nth-child(6){left:55%; bottom:-140px; animation-duration:43s; animation-delay:8s;}
    .blob:nth-child(7){left:65%; bottom:-220px; animation-duration:37s; animation-delay:13s; width:240px; height:240px;}
    .blob:nth-child(8){left:75%; bottom:-160px; animation-duration:41s; animation-delay:18s;}
    .blob:nth-child(9){left:85%; bottom:-190px; animation-duration:39s; animation-delay:20s;}
    .blob:nth-child(10){left:95%; bottom:-130px; animation-duration:44s; animation-delay:22s; width:210px; height:210px;}
    .blob:nth-child(11){left:10%; bottom:-250px; animation-duration:36s; animation-delay:1s;}
    .blob:nth-child(12){left:20%; bottom:-170px; animation-duration:46s; animation-delay:7s; width:230px; height:230px;}
    .blob:nth-child(13){left:40%; bottom:-210px; animation-duration:39s; animation-delay:11s;}
    .blob:nth-child(14){left:60%; bottom:-160px; animation-duration:42s; animation-delay:16s;}
    .blob:nth-child(15){left:80%; bottom:-230px; animation-duration:37s; animation-delay:19s; width:200px; height:200px;}

    /* Luciérnagas */
    .fireflies {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 11;
      opacity: 0;
    }
    body.palette-cementerio .fireflies {
      opacity: 1;
    }
    .firefly {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #E0FFCC;
      border-radius: 50%;
      box-shadow: 0 0 8px #A5FF4D, 0 0 18px #39FF14;
      animation: firefly-float 16s infinite linear, firefly-glow 1.6s infinite alternate;
    }
    @keyframes firefly-float {
      0% { transform: translate(0, 0); }
      100% { transform: translate(var(--x), var(--y)); }
    }
    @keyframes firefly-glow {
      from { opacity: 0.35; box-shadow: 0 0 6px #A5FF4D; }
      to { opacity: 1; box-shadow: 0 0 16px #39FF14, 0 0 28px #7FFF4D; }
    }

    .est, .chi-rho, .social-icons, .palette-button, .vertical-menu { z-index: 25 !important; }
    .vertical-menu {
      position:absolute; right:5vw; bottom:10vh; list-style:none; display:flex; flex-direction:column;
      gap:2.8rem;
    }
    .vertical-menu li {
      font-family:'Cinzel',serif; font-size:1.7rem; color:var(--dorado-luznegra);
      text-transform:uppercase; letter-spacing:6px; cursor:pointer; opacity:0.85;
      transition:all .4s cubic-bezier(0.23,1,0.32,1.275);
    }
    .vertical-menu li:hover { color:#E0FFE6; text-shadow:0 0 40px #E0FFE6; transform:translateX(25px) scale(1.08); }
    @media (max-width: 768px) {
      .vertical-menu { right:6vw; bottom:9vh; gap:2.4rem; }
      .vertical-menu li { font-size:1.55rem; }
    }
    .est { position:absolute; bottom:3vh; left:50%; transform:translateX(-50%); font-size:1.15rem; font-weight:bold; opacity:0.85; }
    .chi-rho { position:absolute; bottom:1.5vh; right:2vw; font-size:1.4rem; opacity:0.8; }
    .social-icons {
      position:absolute; top:3vh; left:50%; transform:translateX(-50%); display:flex; gap:1.6rem; z-index:30;
    }
    .social-icons a {
      color: #FFDDDD;
      font-size:1.85rem;
      text-shadow: 0 0 12px rgba(57,255,20,0.9);
      transition:all .3s;
    }
    .social-icons a:hover { transform:scale(1.25); color:#FFFFFF; }
    .palette-button {
      position:absolute; top:3vh; right:4vw; width:52px; height:52px; border-radius:50%;
      background:var(--ultravioleta-cosmico); border:2px solid var(--rosa-electrico);
      cursor:pointer; z-index:35; color:var(--dorado-luznegra); font-size:1.6rem;
      display:flex; align-items:center; justify-content:center;
    }
    .palette-button:hover { transform:scale(1.1); background:var(--rosa-electrico); color:var(--turquesa-cenote); }

    /* Music Modal y Guestbook */
    .music-player-modal, .guestbook {
      position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
      width:460px; max-height:92vh; overflow-y:auto; background:rgba(11,0,20,0.98);
      border:3px solid var(--bugambilia-neon); border-radius:28px;
      padding:3rem 2.8rem; box-shadow:0 0 90px var(--rosa-electrico), inset 0 0 70px rgba(57,255,20,0.25);
      z-index:10000; opacity:0; visibility:hidden;
      transition:all .6s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    .music-player-modal.active, .guestbook.active {
      opacity:1; visibility:visible; transform:translate(-50%, -50%);
    }
    .music-title {
      text-align:center; font-family:'Cinzel',serif; font-size:1.9rem; margin-bottom:2.2rem;
      color:var(--dorado-luznegra); cursor:pointer; transition:all .3s;
    }
    .chapter-title {
      text-align:center; font-family:'Cinzel',serif; font-size:1.55rem;
      margin:2.8rem 0 1.6rem; color:var(--rosa-electrico); opacity:0.95;
      letter-spacing:4px;
    }
    .esporas-cover {
      width: 205px; height: 205px; border-radius:16px; display:block; margin:0 auto 2.5rem;
      box-shadow:0 0 60px var(--bugambilia-neon); cursor:pointer; transition:all .4s;
      object-fit: cover;
    }
    .esporas-cover:hover { transform:scale(1.05); box-shadow:0 0 85px var(--rosa-electrico); }
    .album-buttons { display:flex; flex-direction:column; gap:0.9rem; }
    .album-option {
      background:rgba(255,255,255,0.06); border:2px solid rgba(193,59,255,0.4);
      color:var(--dorado-luznegra); padding:15px 18px; border-radius:14px;
      cursor:pointer; font-family:'Cinzel',serif; text-align:center; transition:all .3s;
      text-transform: lowercase;
    }
    .album-option:hover, .album-option.active {
      border-color:var(--rosa-electrico);
      background:linear-gradient(90deg, var(--bugambilia-neon), var(--rosa-electrico));
      color:white;
    }
    .spotify-container { margin-top:1.5rem; display:none; }
    .spotify-container.show { display:block; }
    .spotify-btn {
      display:inline-flex; align-items:center; gap:10px; background:var(--rosa-electrico); color:white;
      padding:13px 28px; border-radius:50px; text-decoration:none; font-weight:bold;
      box-shadow:0 0 25px rgba(57,255,20,0.6); transition:all .3s;
    }
    .spotify-btn:hover { transform:scale(1.05); background:#1DB954; }

    .guestbook h2 {
      text-align:center; font-family:'Cinzel',serif; font-size:2.4rem; margin-bottom:2.2rem;
      background:linear-gradient(90deg, var(--dorado-luznegra), var(--bugambilia-neon));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .guestbook input, .guestbook textarea {
      width:100%; background:rgba(255,255,255,0.06); border:2px solid rgba(193,59,255,0.4);
      color:var(--dorado-luznegra); padding:15px 18px; border-radius:14px; margin-bottom:1.2rem;
      font-size:1.1rem;
    }
    .guestbook input:focus, .guestbook textarea:focus {
      border-color:var(--rosa-electrico); box-shadow:0 0 30px rgba(57,255,20,0.5);
    }
    .guestbook textarea { min-height:160px; resize:vertical; }
    .guestbook button[type="submit"] {
      width:100%; padding:16px; background:linear-gradient(90deg, var(--bugambilia-neon), var(--rosa-electrico));
      color:white; border:none; border-radius:50px; font-size:1.15rem; font-weight:bold; cursor:pointer;
    }
    .comments { margin-top:2.8rem; display:flex; flex-direction:column; gap:1.6rem; }
    .comment {
      background:rgba(255,255,255,0.05); border-left:5px solid var(--bugambilia-neon);
      padding:1.6rem 1.8rem; border-radius:14px;
    }
    .close-btn {
      position:absolute; top:1.2rem; right:1.8rem; font-size:3rem;
      color:var(--dorado-luznegra); background:none; border:none; cursor:pointer;
    }
    .close-btn:hover { color:var(--turquesa-cenote); transform:scale(1.2) rotate(90deg); }
    @media (max-width: 768px) {
      .music-player-modal, .guestbook { width:92vw; padding:2.8rem 2rem; }
    }
  </style>
</head>

  <script>
    // Cursor, Logo y Palette
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
    const logo = document.querySelector('.hanzel-logo');
    logo.innerHTML = logo.textContent.split('').map(c => `<span>${c}</span>`).join('');

    let currentPalette = 'cementerio';
    document.getElementById('palette-toggle').addEventListener('click', () => {
      document.body.classList.remove('palette-amoriv','palette-esporas','palette-petite','palette-kantoamere','palette-16rosas','palette-zlooshee','palette-cementerio');
      const palettes = ['cementerio','amoriv','esporas','petite','kantoamere','16rosas','zlooshee'];
      currentPalette = palettes[(palettes.indexOf(currentPalette) + 1) % palettes.length];
      document.body.classList.add(`palette-${currentPalette}`);
    });

    // Luciérnagas
    function createFireflies() {
      const container = document.getElementById('fireflies');
      container.innerHTML = '';
      for (let i = 0; i < 95; i++) {
        const fly = document.createElement('div');
        fly.className = 'firefly';
        const left = Math.random() * 100;
        const size = Math.random() * 4 + 3;
        fly.style.left = `${left}vw`;
        fly.style.top = `${Math.random() * 90}vh`;
        fly.style.width = `${size}px`;
        fly.style.height = `${size}px`;
        fly.style.animationDuration = `${Math.random() * 14 + 13}s`;
        fly.style.animationDelay = `-${Math.random() * 30}s`;
        fly.style.setProperty('--x', `${(Math.random() - 0.5) * 550}px`);
        fly.style.setProperty('--y', `${(Math.random() - 0.5) * 450 - 150}px`);
        container.appendChild(fly);
      }
    }
    createFireflies();
  </script>

    ];
    function switchAlbum(index) {
      const album = albums.find(a => a.index === index);
      if (!album) return;

      // Mantener siempre la portada principal (esporas)
      document.getElementById('main-cover').src = "https://hanzelconzeta.github.io/esporas.png";

      // Spotify
      document.getElementById('spotify-iframe').src = album.embed;
      document.getElementById('open-spotify-btn').href = album.link;
      document.getElementById('spotify-container').classList.add('show');

      // Activar botón
      document.querySelectorAll('.album-option').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.index) === index);
      });
    }
    document.getElementById('music-link').addEventListener('click', () => {
      document.getElementById('music-player-modal').classList.add('active');
      document.getElementById('spotify-container').classList.remove('show');
    });
    document.getElementById('close-music-player').addEventListener('click', () => {
      document.getElementById('music-player-modal').classList.remove('active');
      document.getElementById('spotify-iframe').src = '';
      document.getElementById('spotify-container').classList.remove('show');
    });
    document.getElementById('main-title').addEventListener('click', () => switchAlbum(0));
    document.getElementById('main-cover').addEventListener('click', () => switchAlbum(0));
    document.querySelectorAll('.album-option').forEach(btn => {
      btn.addEventListener('click', () => {
        switchAlbum(parseInt(btn.dataset.index));
      });
    });

    // Guestbook
    document.getElementById('guestbook-link').addEventListener('click', () => {
      document.getElementById('guestbook').classList.add('active');
      loadComments();
    });
    document.getElementById('close-guestbook').addEventListener('click', () => {
      document.getElementById('guestbook').classList.remove('active');
    });
    document.getElementById('guestbook-form').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const message = document.getElementById('message').value.trim();
      if (!name || !message) return;
      try {
        await addDoc(collection(db, 'comments'), { name, message, timestamp: serverTimestamp() });
        alert('¡Gracias por firmar el guestbook ✨');
        e.target.reset();
        loadComments();
      } catch(err) { alert('Error al guardar'); }
    });
    async function loadComments() {
      const list = document.getElementById('comments-list');
      list.innerHTML = '<p style="text-align:center;opacity:0.6;">Cargando mensajes...</p>';
      try {
        const q = query(collection(db, 'comments'), orderBy('timestamp', 'desc'));
        const snapshot = await getDocs(q);
        list.innerHTML = '';
        if (snapshot.empty) {
          list.innerHTML = '<p style="text-align:center;opacity:0.6;">Sé el primero en firmar ✨</p>';
          return;
        }
        snapshot.forEach(doc => {
          const d = doc.data();
          const date = d.timestamp ? d.timestamp.toDate().toLocaleDateString('es-MX') : '';
          const div = document.createElement('div');
          div.className = 'comment';
          div.innerHTML = `<span class="author">${d.name}</span><p>${d.message}</p><span class="date">${date}</span>`;
          list.appendChild(div);
        });
      } catch(err) {
        list.innerHTML = '<p style="text-align:center;color:#ff7777;">Error al cargar</p>';
      }
    }
  </script>
</body>
</html>
