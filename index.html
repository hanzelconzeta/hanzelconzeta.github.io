<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANZEL | poema complejo acerca del alma</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Roboto+Slab:wght@300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --ultravioleta-cosmico:#0B0014;
      --bugambilia-neon:#C13BFF;
      --rosa-electrico:#FF2E98;
      --naranja-volcanico:#FF4F00;
      --verde-acido:#00FF99;
      --turquesa-cenote:#00F0FF;
      --dorado-luznegra:#FFD700;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; overflow-x:hidden; }
    body { background:var(--ultravioleta-cosmico); color:var(--dorado-luznegra); font-family:'Roboto Slab',serif; height:100vh; overflow:hidden; position:relative; cursor:none; }

    /* PALETAS */
    body.palette-16rosas {
      --ultravioleta-cosmico: #63010E;
      --bugambilia-neon: #FCD4D4;
      --rosa-electrico: #FCD4D4;
      --naranja-volcanico: #FF4500;
      --verde-acido: #F5F5F5;
      --turquesa-cenote: #FF69B4;
      --dorado-luznegra: #F5F5F5;
    }
    body.palette-kantoamere {
      --ultravioleta-cosmico: #4A0E2A;
      --bugambilia-neon: #A8C0FF;
      --rosa-electrico: #FF69B4;
      --naranja-volcanico: #FF9EC1;
      --verde-acido: #B0FF99;
      --turquesa-cenote: #99F0FF;
      --dorado-luznegra: #F5E0FF;
    }
    body.palette-zlooshee {
      --ultravioleta-cosmico: #0A1F3D;
      --bugambilia-neon: #00FFCC;
      --rosa-electrico: #FF00FF;
      --naranja-volcanico: #FF4500;
      --verde-acido: #00FF7F;
      --turquesa-cenote: #40E0D0;
      --dorado-luznegra: #FFD700;
    }

    /* PALETA PETITE - HANZEL en plateado/gris metálico */
    body.palette-petite {
      --ultravioleta-cosmico: #00D4FF;
      --bugambilia-neon: #FF0088;
      --rosa-electrico: #FF2EB8;
      --naranja-volcanico: #FF66CC;
      --verde-acido: #B0FFEE;
      --turquesa-cenote: #00FFFF;
      --dorado-luznegra: #E0FFFF;
    }

    .cursor { 
      position:fixed; width:15px; height:15px; border-radius:50%; pointer-events:none; 
      transform:translate(-50%,-50%); mix-blend-mode:screen; z-index:9999; 
      transition:all .1s; animation:colorShift 3s infinite alternate; 
      box-shadow:0 0 20px rgba(255,0,136,0.7),inset 0 0 10px var(--rosa-electrico); 
    }
    @media (pointer: coarse) { .cursor { display:none; } body { cursor: auto; } }
    
    @keyframes colorShift { 
      0%{background:var(--bugambilia-neon)} 25%{background:var(--rosa-electrico)} 
      50%{background:#FF4D94} 75%{background:var(--turquesa-cenote)} 100%{background:#E0E0E0} 
    }

    .intro { position:relative; z-index:10; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width:100%; }
    .hanzel-logo { 
      font-family:'Cinzel',serif; 
      font-size: clamp(4rem, 15vw, 10rem); 
      letter-spacing: clamp(4px, 2vw, 12px); 
      margin-bottom:1rem; white-space: nowrap; 
    }

    /* HANZEL en las otras paletas (sin cambios) */
    body.palette-16rosas .hanzel-logo span,
    body.palette-kantoamere .hanzel-logo span,
    body.palette-zlooshee .hanzel-logo span {
      background:linear-gradient(90deg,var(--bugambilia-neon),var(--rosa-electrico),var(--naranja-volcanico));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:glow 1.5s infinite alternate, float var(--duration) infinite;
      animation-delay:var(--delay);
    }

    /* HANZEL en PETITE - Plateado/gris metálico con brillo */
    body.palette-petite .hanzel-logo span {
      background:linear-gradient(90deg, #B8B8B8, #E0E0E0, #F5F5F5, #C0C0C0);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:glow-petite 1.6s infinite alternate, float var(--duration) infinite;
      animation-delay:var(--delay);
      text-shadow: 0 0 35px #E0E0E0, 0 0 70px #B8B8B8;
    }

    @keyframes glow-petite {
      from { text-shadow: 0 0 30px #E0E0E0, 0 0 60px #B8B8B8; }
      to   { text-shadow: 0 0 50px #E0E0E0, 0 0 90px #B8B8B8, 0 0 120px #F5F5F5; }
    }

    .lava-container { position:absolute; inset:0; filter:url(#goo); pointer-events:none; z-index:5; }
    .blob { 
      position:absolute; width:220px; height:220px; border-radius:50%; 
      background:var(--bugambilia-neon); opacity:0.88; 
      animation:lava-move 40s infinite ease-in-out alternate; 
      box-shadow: 0 0 55px var(--bugambilia-neon); 
    }
    @keyframes lava-move { 
      0%{transform:translateY(0)scale(1)rotate(0)} 
      50%{transform:translateY(-120vh)scale(2.5)rotate(90deg)} 
      100%{transform:translateY(0)scale(1)rotate(0)} 
    }
    .blob:nth-child(1){left:5%;bottom:-100px;animation-duration:35s;}
    .blob:nth-child(2){left:15%;bottom:-150px;animation-duration:42s;animation-delay:5s;}
    .blob:nth-child(3){left:25%;bottom:-200px;animation-duration:38s;animation-delay:10s;}
    .blob:nth-child(4){left:35%;bottom:-120px;animation-duration:45s;animation-delay:15s;}
    .blob:nth-child(5){left:45%;bottom:-180px;animation-duration:40s;animation-delay:3s;}
    .blob:nth-child(6){left:55%;bottom:-140px;animation-duration:43s;animation-delay:8s;}
    .blob:nth-child(7){left:65%;bottom:-220px;animation-duration:37s;animation-delay:13s;}
    .blob:nth-child(8){left:75%;bottom:-160px;animation-duration:41s;animation-delay:18s;}
    .blob:nth-child(9){left:85%;bottom:-190px;animation-duration:39s;animation-delay:20s;}
    .blob:nth-child(10){left:95%;bottom:-130px;animation-duration:44s;animation-delay:22s;}
    .blob:nth-child(11){left:10%;bottom:-250px;animation-duration:36s;animation-delay:1s;}
    .blob:nth-child(12){left:20%;bottom:-170px;animation-duration:46s;animation-delay:7s;}
    .blob:nth-child(13){left:40%;bottom:-210px;animation-duration:39s;animation-delay:11s;}
    .blob:nth-child(14){left:60%;bottom:-160px;animation-duration:42s;animation-delay:16s;}
    .blob:nth-child(15){left:80%;bottom:-230px;animation-duration:37s;animation-delay:19s;}

    .vertical-menu { 
      position:absolute; right:5vw; bottom:11vh; list-style:none; display:flex; flex-direction:column; 
      gap:2.5rem; z-index:25 !important;
    }
    .vertical-menu li { 
      font-family:'Cinzel',serif; font-size:1.65rem; color:var(--dorado-luznegra); 
      text-transform:uppercase; letter-spacing:6px; cursor:pointer; opacity:0.8; 
      transition:all .4s cubic-bezier(0.23,1,0.32,1.275); 
    }
    .vertical-menu li:hover { 
      color:var(--turquesa-cenote); text-shadow:0 0 40px var(--turquesa-cenote); 
      transform:translateX(20px) scale(1.1); 
    }

    .est, .chi-rho { z-index:25 !important; }
    .est { position:absolute; bottom:2vh; left:50%; transform:translateX(-50%); color:var(--dorado-luznegra); font-size:1.2rem; font-weight:bold; opacity:0.85; text-shadow:0 0 15px var(--turquesa-cenote); }
    .chi-rho { position:absolute; bottom:1vh; right:1vw; font-size:1.2rem; color:var(--dorado-luznegra); opacity:0.8; text-shadow:0 0 20px var(--bugambilia-neon),0 0 35px var(--rosa-electrico); animation:glow 3s infinite alternate; }

    .social-icons { 
      position:absolute; top:2vh; left:50%; transform:translateX(-50%); display:flex; gap:1.5rem; z-index:30 !important; 
    }
    .social-icons a { 
      color:var(--verde-acido); font-size:1.8rem; text-shadow:0 0 10px rgba(0,255,153,0.5); 
      transition:transform .3s, color .3s; 
    }
    .social-icons a:hover { color:var(--turquesa-cenote); transform:scale(1.2); }

    .palette-button { 
      position:absolute; top:2vh; right:2vw; width:50px; height:50px; border-radius:50%; 
      background:var(--ultravioleta-cosmico); border:2px solid var(--rosa-electrico); 
      cursor:pointer; z-index:35; transition:all .3s; color:var(--dorado-luznegra); 
      font-size:1.5rem; display:flex; align-items:center; justify-content:center; 
    }
    .palette-button:hover { background:var(--rosa-electrico); border-color:var(--turquesa-cenote); color:var(--turquesa-cenote); transform:scale(1.1); }

    .guestbook, .music-player-modal { 
      position:fixed; top:9vh; left:50%; transform:translateX(-50%) translateY(40px); 
      width:380px; max-height:80vh; overflow-y:auto; background:rgba(11,0,20,0.95); 
      border:2px solid var(--bugambilia-neon); border-radius:20px; 
      padding:2.5rem 2rem 2rem; box-shadow:0 0 60px var(--rosa-electrico), inset 0 0 40px rgba(193,59,255,0.15); 
      z-index:10000; color:var(--verde-acido); opacity:0; visibility:hidden; 
      transition:all .65s cubic-bezier(0.175,0.885,0.32,1.275); 
    }
    .guestbook.show, .guestbook.active, .music-player-modal.show, .music-player-modal.active { 
      opacity:1; visibility:visible; transform:translateX(-50%) translateY(0); 
    }

    .music-player-modal .album-thumbnail { display:block; margin:0 auto 1rem; width:180px; height:180px; border-radius:10px; box-shadow:0 0 20px var(--bugambilia-neon); object-fit:cover; }
    .music-player-modal .album-info { text-align:center; font-style:italic; color:var(--rosa-electrico); font-size:1.2rem; margin-bottom:0.8rem; }
    .music-player-modal .album-option {
      background:rgba(11,0,20,0.75);
      border:2px solid var(--bugambilia-neon);
      color:var(--dorado-luznegra);
      padding:0.7rem 1.2rem;
      border-radius:10px;
      cursor:pointer;
      font-family:'Cinzel',serif;
      font-size:1.05rem;
      text-align:center;
      transition:all .3s;
      text-transform: lowercase;
    }
    .music-player-modal .album-option:hover { border-color:var(--turquesa-cenote); color:var(--turquesa-cenote); }
    .music-player-modal .album-option.active {
      background:linear-gradient(90deg,var(--bugambilia-neon),var(--rosa-electrico));
      border-color:var(--rosa-electrico);
      color:var(--dorado-luznegra);
    }
    .music-player-modal .player-controls .song-title { font-size:1.3rem; font-weight:bold; color:var(--turquesa-cenote); text-shadow:0 0 10px var(--verde-acido); }
    .music-player-modal .player-controls button { background:transparent; border:none; color:var(--verde-acido); cursor:pointer; font-size:2rem; transition:all .3s; }
    .music-player-modal .player-controls button:hover { color:var(--turquesa-cenote); transform:scale(1.2); }
    .music-player-modal .song-list { list-style:none; margin-bottom:1rem; padding:0 1rem; }
    .music-player-modal .song-list li { cursor:pointer; padding:0.8rem 0; border-bottom:1px dashed var(--rosa-electrico); transition:all .3s; font-size:1.1rem; display:flex; justify-content:space-between; align-items:center; }
    .music-player-modal .song-list li:hover { color:var(--turquesa-cenote); }
    .music-player-modal .song-list li.active { font-weight:bold; color:var(--turquesa-cenote); text-shadow:0 0 10px var(--verde-acido); }
    .music-player-modal .song-list li .download-link { color: var(--naranja-volcanico); font-size: 1.2rem; margin-left: 0.5rem; cursor:pointer; }
    .music-player-modal .song-list li .download-link:hover { color: var(--turquesa-cenote); }

    @media (max-width: 768px) {
      .hanzel-logo { font-size: clamp(3.8rem, 15vw, 6rem); letter-spacing: clamp(3px, 1.5vw, 8px); }
      .lava-container { z-index:8; filter:url(#goo-mobile) !important; }
      .blob { width:165px; height:165px; opacity:0.95; }
      .blob:nth-child(n+7) { display:none; }
      .vertical-menu { bottom:15vh; gap:2rem; right:6vw; }
      .vertical-menu li { font-size:1.35rem; letter-spacing:4px; }
      .est { font-size:1rem; bottom:4vh; }
      .chi-rho { font-size:1.5rem; bottom:4vh; right:4vw; }
      .social-icons { top:3.5vh; gap:1.2rem; }
      .social-icons a { font-size:1.6rem; }
      .guestbook, .music-player-modal { width:92vw; max-width:420px; padding:2rem 1.8rem 1.8rem; }
      .music-player-modal .album-thumbnail { width:140px; height:140px; }
    }

    @keyframes glow { from{text-shadow:0 0 20px var(--dorado-luznegra),0 0 40px var(--bugambilia-neon)} to{text-shadow:0 0 40px var(--dorado-luznegra),0 0 80px var(--bugambilia-neon)} }
    @keyframes float { 0%,100%{transform:translateY(0)scale(1)} 50%{transform:translateY(-8px)scale(1.02)} }
  </style>
</head>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      const trail = document.createElement('div');
      trail.className = 'cursor-trail';
      trail.style.left = e.clientX + 'px';
      trail.style.top = e.clientY + 'px';
      trail.style.background = `radial-gradient(circle, #FF0088, #FF4D94, #FFAA00, transparent)`;
      document.body.appendChild(trail);
      setTimeout(() => trail.remove(), 1000);
    });
    document.querySelectorAll('button, li, a').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
    document.addEventListener('mousedown', () => cursor.classList.add('click'));
    document.addEventListener('mouseup', () => cursor.classList.remove('click'));

    const logo = document.querySelector('.hanzel-logo');
    const text = logo.textContent;
    logo.innerHTML = '';
    const durations = [5,6,4.5,5.5,4,6];
    const delays = [0,0.1,0.2,0.05,0.15,0.25];
    text.split('').forEach((char,i) => {
      const span = document.createElement('span');
      span.textContent = char;
      span.style.setProperty('--duration', `${durations[i]}s`);
      span.style.setProperty('--delay', `${delays[i]}s`);
      logo.appendChild(span);
    });

    const paletteToggle = document.getElementById('palette-toggle');
    let currentPalette = 'kantoamere';
    paletteToggle.addEventListener('click', () => {
      if (currentPalette === 'kantoamere') {
        document.body.classList.remove('palette-kantoamere'); document.body.classList.add('palette-16rosas'); currentPalette = '16rosas';
      } else if (currentPalette === '16rosas') {
        document.body.classList.remove('palette-16rosas'); document.body.classList.add('palette-zlooshee'); currentPalette = 'zlooshee';
      } else if (currentPalette === 'zlooshee') {
        document.body.classList.remove('palette-zlooshee'); document.body.classList.add('palette-petite'); currentPalette = 'petite';
      } else {
        document.body.classList.remove('palette-petite'); document.body.classList.add('palette-kantoamere'); currentPalette = 'kantoamere';
      }
    });
  </script>

        ]
      },
      {
        title: "petite (2026)",
        cover: "https://hanzelconzeta.github.io/petite_portada.PNG",
        songs: []
      }
    ];

    let currentAlbumIndex = 0;
    let currentSongIndex = 0;
    const audio = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const songTitle = document.getElementById('song-title');
    const songList = document.getElementById('song-list');
    const musicPlayerModal = document.getElementById('music-player-modal');
    const albumCover = document.getElementById('album-cover');
    const albumTitleEl = document.getElementById('album-title');
    const option0 = document.getElementById('option-0');
    const option1 = document.getElementById('option-1');
    const option2 = document.getElementById('option-2');

    function switchAlbum(index) {
      currentAlbumIndex = index;
      option0.classList.toggle('active', index === 0);
      option1.classList.toggle('active', index === 1);
      option2.classList.toggle('active', index === 2);

      const album = albums[index];
      albumTitleEl.textContent = album.title;
      albumCover.src = album.cover;
      populateSongList();

      if (album.songs.length > 0) loadSong(0);
      else {
        songTitle.textContent = 'Próximamente...';
        playPauseBtn.textContent = '▶';
      }
    }

    function loadSong(i) {
      const album = albums[currentAlbumIndex];
      if (album.songs.length === 0) return;
      currentSongIndex = i;
      audio.src = album.songs[i].src;
      songTitle.textContent = album.songs[i].title;
      audio.load();
      audio.play().catch(() => {});
      playPauseBtn.textContent = '❚❚';
      document.querySelectorAll('.song-list li').forEach((li, idx) => li.classList.toggle('active', idx === i));
    }

    function populateSongList() {
      songList.innerHTML = '';
      const hasCommented = localStorage.getItem('hasCommented') === 'true';
      const album = albums[currentAlbumIndex];

      if (album.songs.length === 0) {
        const li = document.createElement('li');
        li.style.cssText = 'text-align:center; opacity:0.75; padding:3rem 0; font-style:italic;';
        li.innerHTML = 'Próximamente... ✨<br><small>Las canciones de petite llegarán muy pronto</small>';
        songList.appendChild(li);
        document.getElementById('download-album').innerHTML = '<p style="text-align:center; color:var(--rosa-electrico);">Próximamente las canciones de petite</p>';
        return;
      }

      album.songs.forEach((song, i) => {
        const li = document.createElement('li');
        let downloadLink = hasCommented ? ` <a href="${song.src}" download class="download-link"><i class="fas fa-download"></i></a>` : '';
        li.innerHTML = `<span>${i + 1}. ${song.title}</span><span>${song.duration}${downloadLink}</span>`;
        li.addEventListener('click', () => loadSong(i));
        songList.appendChild(li);
      });

      const downloadAlbum = document.getElementById('download-album');
      downloadAlbum.innerHTML = hasCommented 
        ? '<p style="text-align:center; color:var(--verde-acido);">Descargas individuales habilitadas ↓</p>' 
        : '<p style="text-align:center; color:var(--rosa-electrico);">Deja un comentario en el guestbook para descargar las canciones</p>';
    }

    playPauseBtn.addEventListener('click', () => {
      if (audio.paused) { audio.play(); playPauseBtn.textContent = '❚❚'; }
      else { audio.pause(); playPauseBtn.textContent = '▶'; }
    });
    prevBtn.addEventListener('click', () => {
      const len = albums[currentAlbumIndex].songs.length;
      if (len > 0) loadSong((currentSongIndex - 1 + len) % len);
    });
    nextBtn.addEventListener('click', () => {
      const len = albums[currentAlbumIndex].songs.length;
      if (len > 0) loadSong((currentSongIndex + 1) % len);
    });
    audio.addEventListener('ended', () => nextBtn.click());

    populateSongList();
    loadSong(0);

    option0.addEventListener('click', () => switchAlbum(0));
    option1.addEventListener('click', () => switchAlbum(1));
    option2.addEventListener('click', () => switchAlbum(2));

    document.getElementById('music-link').addEventListener('click', () => {
      musicPlayerModal.classList.add('active');
      populateSongList();
    });
    document.getElementById('close-music-player').addEventListener('click', () => musicPlayerModal.classList.remove('active'));

    const guestbook = document.getElementById('guestbook');
    document.getElementById('guestbook-link').addEventListener('click', () => {
      guestbook.classList.add('active');
      loadComments();
    });
    document.getElementById('close-guestbook').addEventListener('click', () => guestbook.classList.remove('active'));

    document.getElementById('guestbook-form').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const message = document.getElementById('message').value.trim();
      if (!name || !message) return;
      try {
        await addDoc(collection(db, 'comments'), { name, message, timestamp: serverTimestamp() });
        alert('¡Gracias por firmar el guestbook!');
        document.getElementById('guestbook-form').reset();
        localStorage.setItem('hasCommented', 'true');
        loadComments();
        if (musicPlayerModal.classList.contains('active')) populateSongList();
      } catch(err) {
        console.error(err);
        alert('Error al enviar el comentario');
      }
    });

    async function loadComments() {
      const list = document.getElementById('comments-list');
      list.innerHTML = '<p style="text-align:center;opacity:0.6;">Cargando...</p>';
      try {
        const q = query(collection(db, 'comments'), orderBy('timestamp', 'desc'));
        const snapshot = await getDocs(q);
        list.innerHTML = '';
        snapshot.forEach(doc => {
          const d = doc.data();
          const date = d.timestamp ? d.timestamp.toDate().toLocaleDateString('es-MX') : '';
          const div = document.createElement('div');
          div.className = 'comment';
          div.innerHTML = `<span class="author">${d.name}</span><p>${d.message}</p><span class="date">${date}</span>`;
          list.appendChild(div);
        });
        if (snapshot.empty) list.innerHTML = '<p style="text-align:center;opacity:0.6;">Sé el primero ✨</p>';
      } catch(err) {
        list.innerHTML = '<p style="text-align:center;color:red;">Error al cargar comentarios</p>';
      }
    }
  </script>
</body>
</html>
