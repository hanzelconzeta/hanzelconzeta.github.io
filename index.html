<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>HANZEL | poema complejo acerca del alma</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Roboto+Slab:wght@300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --ultravioleta-cosmico: #0B0014;
      --bugambilia-neon: #C13BFF;
      --rosa-electrico: #FF2E98;
      --naranja-volcanico: #FF4F00;
      --verde-acido: #00FF99;
      --turquesa-cenote: #00F0FF;
      --dorado-luznegra: #FFD700;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      font-family: 'Roboto Slab', serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--ultravioleta-cosmico);
      color: var(--dorado-luznegra);
      cursor: none;
    }

    /* PALETAS */
    body.palette-16rosas   { --ultravioleta-cosmico: #63010E; --bugambilia-neon: #FCD4D4; --rosa-electrico: #FCD4D4; --naranja-volcanico: #FF4500; --verde-acido: #F5F5F5; --turquesa-cenote: #FF69B4; --dorado-luznegra: #F5F5F5; }
    body.palette-kantoamere{ --ultravioleta-cosmico: #4A0E2A; --bugambilia-neon: #A8C0FF; --rosa-electrico: #FF69B4; --naranja-volcanico: #FF9EC1; --verde-acido: #B0FF99; --turquesa-cenote: #99F0FF; --dorado-luznegra: #F5E0FF; }
    body.palette-zlooshee  { --ultravioleta-cosmico: #0A1F3D; --bugambilia-neon: #00FFCC; --rosa-electrico: #FF00FF; --naranja-volcanico: #FF4500; --verde-acido: #00FF7F; --turquesa-cenote: #40E0D0; --dorado-luznegra: #FFD700; }
    body.palette-petite    { 
      --ultravioleta-cosmico: #00A8D0; 
      --bugambilia-neon: #FF0088;
      --rosa-electrico: #FF2EB8;
      --naranja-volcanico: #FF66CC;
      --verde-acido: #B0FFEE;
      --turquesa-cenote: #00FFFF;
      --dorado-luznegra: #E0FFFF;
    }

    /* Cursor solo en desktop */
    .cursor {
      position: fixed;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
      z-index: 9999;
      box-shadow: 0 0 25px rgba(255, 0, 136, 0.8);
      will-change: transform;
    }
    @media (pointer: coarse) { .cursor { display: none !important; } }

    .intro {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }

    .hanzel-logo {
      font-family: 'Cinzel', serif;
      font-size: clamp(4.2rem, 15.5vw, 11rem);
      letter-spacing: clamp(5px, 2.5vw, 15px);
      margin-bottom: 1.2rem;
      white-space: nowrap;
      -webkit-text-stroke: 3px rgba(0, 0, 0, 0.25);
      text-shadow: 0 0 40px rgba(255,255,255,0.7);
    }

    /* HANZEL legible y fuerte */
    .hanzel-logo span {
      background: linear-gradient(90deg, var(--bugambilia-neon), var(--rosa-electrico), #FFFFFF);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 1.8s infinite alternate, float var(--duration) infinite;
      animation-delay: var(--delay);
    }

    body.palette-petite .hanzel-logo span {
      background: linear-gradient(90deg, #FF1E85, #FF4D94, #FF80B8, #FFCCDD, #FFFFFF);
      -webkit-text-stroke: 3px #00000033;
      text-shadow: 0 0 35px #FF2E98, 0 0 65px #FF69B4, 0 0 95px #FFFFFF;
      animation: glow-petite 1.7s infinite alternate, float var(--duration) infinite;
    }

    @keyframes glow-petite {
      from { text-shadow: 0 0 30px #FF2E98, 0 0 60px #FF69B4, 0 0 90px #FFFFFF; }
      to   { text-shadow: 0 0 45px #FF2E98, 0 0 80px #FF69B4, 0 0 120px #FFFFFF; }
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px var(--dorado-luznegra), 0 0 45px var(--bugambilia-neon); }
      to   { text-shadow: 0 0 40px var(--dorado-luznegra), 0 0 85px var(--bugambilia-neon); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-12px) scale(1.02); }
    }

    /* Lava - versión más estable para Safari y móviles */
    .lava-container {
      position: absolute;
      inset: 0;
      filter: url(#goo);
      -webkit-filter: url(#goo);
      pointer-events: none;
      z-index: 4;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      width: 185px;
      height: 185px;
      border-radius: 50%;
      background: var(--bugambilia-neon);
      opacity: 0.85;
      box-shadow: 0 0 55px var(--bugambilia-neon);
      will-change: transform;
    }

    @keyframes lava-move {
      0%   { transform: translateY(0) scale(1) rotate(0deg); }
      100% { transform: translateY(-135vh) scale(2.7) rotate(90deg); }
    }

    /* Elementos de interfaz */
    .vertical-menu {
      position: absolute;
      right: 5vw;
      bottom: 13vh;
      list-style: none;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 2.3rem;
    }
    .vertical-menu li {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.35rem, 4.2vw, 1.75rem);
      text-transform: uppercase;
      letter-spacing: 5px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1.275);
    }
    .vertical-menu li:hover {
      color: #FFE066;
      text-shadow: 0 0 35px #FFE066;
      transform: translateX(18px);
    }

    .est { 
      position: absolute; 
      bottom: 4vh; 
      left: 50%; 
      transform: translateX(-50%); 
      font-size: 1.15rem; 
      font-weight: 600; 
      z-index: 25; 
    }

    .chi-rho { 
      position: absolute; 
      bottom: 4vh; 
      right: 5vw; 
      font-size: 1.45rem; 
      z-index: 25; 
      opacity: 0.9; 
    }

    .social-icons {
      position: absolute;
      top: 4vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.6rem;
      z-index: 35;
    }
    .social-icons a {
      color: var(--verde-acido);
      font-size: 1.85rem;
      transition: all 0.3s ease;
    }
    .social-icons a:hover {
      color: #FFE066;
      transform: scale(1.25);
    }

    .palette-button {
      position: absolute;
      top: 4vh;
      right: 5vw;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--ultravioleta-cosmico);
      border: 2px solid var(--rosa-electrico);
      color: var(--dorado-luznegra);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      cursor: pointer;
      z-index: 40;
      transition: all 0.3s;
    }
    .palette-button:hover {
      transform: scale(1.12);
      background: var(--rosa-electrico);
      color: white;
    }

    /* Modales */
    .guestbook, .music-player-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateY(40px);
      width: 92%;
      max-width: 460px;
      max-height: 88vh;
      background: rgba(11, 0, 20, 0.98);
      border: 3px solid var(--bugambilia-neon);
      border-radius: 28px;
      padding: 2.8rem 2.4rem 2.4rem;
      box-shadow: 0 0 90px rgba(193, 59, 255, 0.45);
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .guestbook.active, .music-player-modal.active {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) translateY(0);
    }

    .close-btn {
      position: absolute;
      top: 1.2rem;
      right: 1.8rem;
      font-size: 2.8rem;
      color: var(--dorado-luznegra);
      background: none;
      border: none;
      cursor: pointer;
      z-index: 10001;
      transition: all 0.4s ease;
    }
    .close-btn:hover {
      color: var(--turquesa-cenote);
      transform: scale(1.25) rotate(90deg);
    }

    .luna-message {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.15rem, 3.8vw, 1.38rem);
      line-height: 1.45;
      color: #FFCC99;
      text-shadow: 0 0 20px #FF99CC, 0 0 38px #FF69B4;
      margin: 1rem 0 1.8rem;
      padding: 1.4rem 1.8rem;
      border: 1px solid rgba(255,153,204,0.4);
      border-radius: 22px;
      background: rgba(255,204,153,0.08);
      box-shadow: 0 0 30px rgba(255,105,180,0.3);
    }

    .album-thumbnail { 
      display: none; 
      margin: 1rem auto 1.4rem; 
      width: 195px; 
      height: 195px; 
      border-radius: 18px; 
      box-shadow: 0 0 35px var(--bugambilia-neon); 
      object-fit: cover; 
    }
    .album-thumbnail.show { display: block; }

    .album-selector { display: flex; flex-direction: column; gap: 0.9rem; margin-bottom: 1.4rem; }
    .album-option {
      background: rgba(255,255,255,0.08);
      border: 2px solid var(--bugambilia-neon);
      color: var(--dorado-luznegra);
      padding: 1.1rem;
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      transition: all 0.3s ease;
    }
    .album-option.active, .album-option:hover {
      border-color: var(--turquesa-cenote);
      background: rgba(0, 240, 255, 0.12);
    }

    .song-list { list-style: none; padding: 0; margin: 1.2rem 0; display: none; }
    .song-list.show { display: block; }
    .song-list li {
      padding: 1.05rem 0;
      border-bottom: 1px dashed rgba(255,46,152,0.4);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-size: 1.08rem;
    }
    .song-list li:hover { color: var(--turquesa-cenote); }
    .download-link { color: var(--naranja-volcanico); margin-left: 12px; font-size: 1.4rem; }

    @media (max-width: 768px) {
      .lava-container { filter: url(#goo-mobile) !important; -webkit-filter: url(#goo-mobile) !important; }
      .blob { width: 150px; height: 150px; }
      .vertical-menu { bottom: 15vh; right: 6vw; gap: 2rem; }
      .social-icons { top: 3.5vh; gap: 1.4rem; }
      .social-icons a { font-size: 1.7rem; }
    }
  </style>
</head>

  <script>
    // Cursor solo en desktop
    if (window.matchMedia("(pointer: fine)").matches) {
      const cursor = document.createElement('div');
      cursor.className = 'cursor';
      document.body.appendChild(cursor);
      document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });
    }

    // Logo animado letra por letra
    const logo = document.querySelector('.hanzel-logo');
    const text = logo.textContent;
    logo.innerHTML = '';
    const durations = [5.2, 6.1, 4.8, 5.7, 4.3, 6.4];
    const delays = [0, 0.12, 0.25, 0.08, 0.18, 0.3];

    text.split('').forEach((char, i) => {
      const span = document.createElement('span');
      span.textContent = char;
      span.style.setProperty('--duration', `${durations[i]}s`);
      span.style.setProperty('--delay', `${delays[i]}s`);
      logo.appendChild(span);
    });

    // Cambio de paleta
    let currentPalette = 'petite';
    document.getElementById('palette-toggle').addEventListener('click', () => {
      const palettes = ['palette-petite', 'palette-kantoamere', 'palette-16rosas', 'palette-zlooshee'];
      document.body.classList.remove(...palettes);
      currentPalette = palettes[(palettes.indexOf('palette-' + currentPalette) + 1) % 4];
      document.body.classList.add(currentPalette);
    });
  </script>

  <script type="module">

    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD84RLER1Z0z3YX0XnBvFEu0WLIw3frGro",
      authDomain: "hanzelconzeta-bd17b.firebaseapp.com",
      projectId: "hanzelconzeta-bd17b",
      storageBucket: "hanzelconzeta-bd17b.firebasestorage.app",
      messagingSenderId: "855182658974",
      appId: "1:855182658974:web:7dede44a589105053c1a8f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const albums = [
      {
        title: "16 rosas y algo llamado amor (2006)",
        cover: "https://hanzelconzeta.github.io/portadarosas.JPG",
        songs: [
          { title: 'primer acto', src: 'https://hanzelconzeta.github.io/primer_acto.mp3', duration: '3:45' },
          { title: 'me hiciste creer', src: 'https://hanzelconzeta.github.io/me_hiciste_creer.mp3', duration: '4:12' },
          { title: 'te entrego hoy', src: 'https://hanzelconzeta.github.io/te_entrego_hoy.mp3', duration: '3:30' },
          { title: 'montaña rusa', src: 'https://hanzelconzeta.github.io/montana_rusa.mp3', duration: '4:05' },
          { title: 'sin identidad', src: 'https://hanzelconzeta.github.io/sin_identidad.mp3', duration: '3:50' },
          { title: 'la gloria #109 (27 de mayo)', src: 'https://hanzelconzeta.github.io/la_gloria.mp3', duration: '4:20' },
          { title: 'que dificil seria verte partir', src: 'https://hanzelconzeta.github.io/que_dificil_seria_verte_partir.mp3', duration: '5:10' }
        ]
      },
      {
        title: "kanto amere (2007)",
        cover: "https://hanzelconzeta.github.io/kanto_portada.jpg",
        songs: [
          { title: 'los mejores romances', src: 'https://hanzelconzeta.github.io/los_mejores_romances.mp3', duration: '1:14' },
          { title: 'siempre terminan en tragedia', src: 'https://hanzelconzeta.github.io/siempre_terminan_en_tragedia.mp3', duration: '4:24' },
          { title: 'si no es hoy, mañana...', src: 'https://hanzelconzeta.github.io/si_no_es_hoy.mp3', duration: '5:30' },
          { title: 'carta a sally', src: 'https://hanzelconzeta.github.io/carta_a_sally.mp3', duration: '4:40' },
          { title: 'al final del arcoiris', src: 'https://hanzelconzeta.github.io/al_final_del_arcoiris.mp3', duration: '4:41' },
          { title: 'suelo mirar al cielo cuando pienso en ti', src: 'https://hanzelconzeta.github.io/suelo_mirar_al_cielo_cuando_pienso_en_ti.mp3', duration: '5:35' }
        ]
      },
      {
        title: "petite (2009)",
        cover: "https://hanzelconzeta.github.io/petite_portada.PNG",
        songs: [
          { title: 'cuentacuentos', src: 'https://hanzelconzeta.github.io/cuentacuentos.mp3', duration: '3:33' },
          { title: 'segundo acto: nostalgia', src: 'https://hanzelconzeta.github.io/segundo_acto2009.mp3', duration: '2:55' },
          { title: '10:01', src: 'https://hanzelconzeta.github.io/1001_2009.mp3', duration: '2:59' },
          { title: 'pequeña eiffel', src: 'https://hanzelconzeta.github.io/pequena_eiffel2009.mp3', duration: '3:54' },
          { title: 'aioros', src: 'https://hanzelconzeta.github.io/aioros.mp3', duration: '3:45' },
          { title: 'segundo acto: nostalgia (bonus track)', src: 'https://hanzelconzeta.github.io/segundo_acto2008.mp3', duration: '2:47' },
          { title: '10:01 (bonus track)', src: 'https://hanzelconzeta.github.io/1001_2008.mp3', duration: '3:07' },
          { title: 'pequeña eiffel (bonus track)', src: 'https://hanzelconzeta.github.io/pequena_eiffel2008.mp3', duration: '3:47' }
        ]
      }
    ];

    let currentAlbumIndex = -1;
    let currentSongIndex = 0;
    let isPlaying = false;

    const audio = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const songTitle = document.getElementById('song-title');
    const songList = document.getElementById('song-list');
    const musicPlayerModal = document.getElementById('music-player-modal');
    const albumCover = document.getElementById('album-cover');
    const albumTitleEl = document.getElementById('album-title');
    const playerControls = document.querySelector('.player-controls');
    const albumInfo = document.querySelector('.album-info');

    function switchAlbum(index) {
      currentAlbumIndex = index;
      document.querySelectorAll('.album-option').forEach((opt, i) => opt.classList.toggle('active', i === index));

      const album = albums[index];
      albumTitleEl.textContent = album.title;
      albumCover.src = album.cover;

      albumCover.classList.add('show');
      albumInfo.classList.add('show');
      playerControls.classList.add('show');
      songList.classList.add('show');

      populateSongList();
      songTitle.textContent = '';
      playPauseBtn.textContent = '▶';
      isPlaying = false;
    }

    function loadSong(i) {
      const album = albums[currentAlbumIndex];
      currentSongIndex = i;
      audio.src = album.songs[i].src || '';
      songTitle.textContent = album.songs[i].title;
      document.querySelectorAll('.song-list li').forEach((li, idx) => li.classList.toggle('active', idx === i));
    }

    function populateSongList() {
      songList.innerHTML = '';
      const album = albums[currentAlbumIndex];

      album.songs.forEach((song, i) => {
        const li = document.createElement('li');
        const downloadLink = song.src ? ` <a href="${song.src}" download class="download-link"><i class="fas fa-download"></i></a>` : '';
        li.innerHTML = `<span>${i + 1}. ${song.title}</span><span>${song.duration}${downloadLink}</span>`;
        li.addEventListener('click', () => {
          loadSong(i);
          if (audio.src) {
            audio.play().catch(() => {});
            isPlaying = true;
            playPauseBtn.textContent = '❚❚';
          }
        });
        songList.appendChild(li);
      });
    }

    playPauseBtn.addEventListener('click', () => {
      if (audio.paused) {
        if (!audio.src && albums[currentAlbumIndex].songs.length > 0) loadSong(0);
        if (audio.src) {
          audio.play();
          isPlaying = true;
          playPauseBtn.textContent = '❚❚';
        }
      } else {
        audio.pause();
        isPlaying = false;
        playPauseBtn.textContent = '▶';
      }
    });

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentAlbumIndex < 0) return;
      const len = albums[currentAlbumIndex].songs.length;
      currentSongIndex = (currentSongIndex - 1 + len) % len;
      loadSong(currentSongIndex);
      if (isPlaying && audio.src) audio.play();
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (currentAlbumIndex < 0) return;
      const len = albums[currentAlbumIndex].songs.length;
      currentSongIndex = (currentSongIndex + 1) % len;
      loadSong(currentSongIndex);
      if (isPlaying && audio.src) audio.play();
    });

    document.getElementById('music-link').addEventListener('click', () => {
      musicPlayerModal.classList.add('active');
      albumCover.classList.remove('show');
      albumInfo.classList.remove('show');
      playerControls.classList.remove('show');
      songList.classList.remove('show');
    });

    document.getElementById('close-music-player').addEventListener('click', () => {
      musicPlayerModal.classList.remove('active');
      audio.pause();
      playPauseBtn.textContent = '▶';
    });

    document.getElementById('option-0').addEventListener('click', () => switchAlbum(0));
    document.getElementById('option-1').addEventListener('click', () => switchAlbum(1));
    document.getElementById('option-2').addEventListener('click', () => switchAlbum(2));

    // Guestbook
    const guestbook = document.getElementById('guestbook');
    document.getElementById('guestbook-link').addEventListener('click', () => {
      guestbook.classList.add('active');
      loadComments();
    });

    document.getElementById('close-guestbook').addEventListener('click', () => guestbook.classList.remove('active'));

    document.getElementById('guestbook-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const message = document.getElementById('message').value.trim();
      if (!name || !message) return;

      try {
        await addDoc(collection(db, 'comments'), { name, message, timestamp: serverTimestamp() });
        alert('¡Gracias por firmar el guestbook!');
        document.getElementById('guestbook-form').reset();
        loadComments();
      } catch (err) {
        console.error(err);
        alert('Error al enviar el comentario');
      }
    });

    async function loadComments() {
      const list = document.getElementById('comments-list');
      list.innerHTML = '<p style="text-align:center;opacity:0.6;">Cargando...</p>';
      try {
        const q = query(collection(db, 'comments'), orderBy('timestamp', 'desc'));
        const snapshot = await getDocs(q);
        list.innerHTML = '';
        snapshot.forEach(doc => {
          const d = doc.data();
          const date = d.timestamp ? d.timestamp.toDate().toLocaleDateString('es-MX') : '';
          const div = document.createElement('div');
          div.className = 'comment';
          div.innerHTML = `<span class="author">${d.name}</span><p>${d.message}</p><span class="date">${date}</span>`;
          list.appendChild(div);
        });
        if (snapshot.empty) list.innerHTML = '<p style="text-align:center;opacity:0.6;">Sé el primero ✨</p>';
      } catch(err) {
        list.innerHTML = '<p style="text-align:center;color:red;">Error al cargar comentarios</p>';
      }
    }
  </script>
</body>
</html>
