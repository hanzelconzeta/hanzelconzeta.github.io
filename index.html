<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANZEL | poema complejo acerca del alma</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Roboto+Slab:wght@300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --ultravioleta-cosmico:#0B0014;
      --bugambilia-neon:#C13BFF;
      --rosa-electrico:#FF2E98;
      --naranja-volcanico:#FF4F00;
      --verde-acido:#00FF99;
      --turquesa-cenote:#00F0FF;
      --dorado-luznegra:#FFD700;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; overflow-x:hidden; }
    body { 
      background:var(--ultravioleta-cosmico); 
      color:var(--dorado-luznegra); 
      font-family:'Roboto Slab',serif; 
      height:100vh; 
      overflow:hidden; 
      position:relative; 
      cursor:none; 
    }

    /* Paletas */
    body.palette-16rosas {
      --ultravioleta-cosmico: #63010E;
      --bugambilia-neon: #FCD4D4;
      --rosa-electrico: #FCD4D4;
      --naranja-volcanico: #FF4500;
      --verde-acido: #F5F5F5;
      --turquesa-cenote: #FF69B4;
      --dorado-luznegra: #F5F5F5;
    }
    body.palette-kantoamere {
      --ultravioleta-cosmico: #4A0E2A;
      --bugambilia-neon: #A8C0FF;
      --rosa-electrico: #FF69B4;
      --naranja-volcanico: #FF9EC1;
      --verde-acido: #B0FF99;
      --turquesa-cenote: #99F0FF;
      --dorado-luznegra: #F5E0FF;
    }
    body.palette-zlooshee {
      --ultravioleta-cosmico: #0A1F3D;
      --bugambilia-neon: #00BFFF;
      --rosa-electrico: #FF00FF;
      --naranja-volcanico: #FF4500;
      --verde-acido: #00FF7F;
      --turquesa-cenote: #40E0D0;
      --dorado-luznegra: #FFD700;
    }

    /* === LAVA LAMP COMPATIBLE CON SAFARI === */
    .lava-container { 
      position:absolute; 
      inset:0; 
      pointer-events:none; 
      z-index:5; 
      mix-blend-mode: screen;
      overflow: hidden;
    }
    .blob { 
      position:absolute; 
      width:240px; 
      height:240px; 
      border-radius:50%; 
      background:var(--bugambilia-neon); 
      opacity:0.75; 
      filter: blur(35px); 
      animation:lava-move 38s infinite ease-in-out alternate; 
      will-change: transform, opacity;
    }
    @keyframes lava-move { 
      0%   { transform: translateY(0) scale(1) rotate(0deg); }
      50%  { transform: translateY(-130vh) scale(2.8) rotate(90deg); }
      100% { transform: translateY(0) scale(1) rotate(0deg); }
    }

    /* Posiciones de los blobs */
    .blob:nth-child(1){left:5%; bottom:-120px; animation-duration:35s;}
    .blob:nth-child(2){left:15%; bottom:-150px; animation-duration:42s; animation-delay:4s;}
    .blob:nth-child(3){left:25%; bottom:-200px; animation-duration:38s; animation-delay:9s;}
    .blob:nth-child(4){left:35%; bottom:-110px; animation-duration:45s; animation-delay:14s;}
    .blob:nth-child(5){left:45%; bottom:-180px; animation-duration:40s; animation-delay:2s;}
    .blob:nth-child(6){left:55%; bottom:-140px; animation-duration:43s; animation-delay:7s;}
    .blob:nth-child(7){left:65%; bottom:-220px; animation-duration:37s; animation-delay:12s;}
    .blob:nth-child(8){left:75%; bottom:-160px; animation-duration:41s; animation-delay:17s;}
    .blob:nth-child(9){left:85%; bottom:-190px; animation-duration:39s; animation-delay:19s;}
    .blob:nth-child(10){left:95%; bottom:-130px; animation-duration:44s; animation-delay:21s;}
    .blob:nth-child(11){left:10%; bottom:-250px; animation-duration:36s; animation-delay:1s;}
    .blob:nth-child(12){left:20%; bottom:-170px; animation-duration:46s; animation-delay:6s;}
    .blob:nth-child(13){left:40%; bottom:-210px; animation-duration:39s; animation-delay:11s;}
    .blob:nth-child(14){left:60%; bottom:-155px; animation-duration:42s; animation-delay:16s;}
    .blob:nth-child(15){left:80%; bottom:-230px; animation-duration:37s; animation-delay:18s;}

    /* Cursor */
    .cursor { position:fixed; width:15px; height:15px; border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); mix-blend-mode:screen; z-index:9999; transition:all .1s; box-shadow:0 0 15px rgba(193,59,255,0.5),inset 0 0 10px var(--rosa-electrico); }
    @media (pointer: coarse) { .cursor { display:none; } body { cursor: auto; } }
    .cursor.hover { width:22px; height:22px; box-shadow:0 0 25px rgba(255,46,152,0.7); }
    .cursor.click { transform:translate(-50%,-50%) scale(1.3); }

    .cursor-trail { 
      position:fixed; width:10px; height:10px; border-radius:50%; pointer-events:none; 
      transform:translate(-50%,-50%); z-index:9998; 
      animation:fadeOut 1.2s forwards; 
    }
    @keyframes fadeOut { to{opacity:0; transform:scale(2) translate(-50%,-50%)} }

    /* Intro y elementos principales */
    .intro { position:relative; z-index:10; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width:100%; }
    .hanzel-logo { font-family:'Cinzel',serif; font-size: clamp(4rem, 15vw, 10rem); letter-spacing: clamp(4px, 2vw, 12px); margin-bottom:1rem; white-space: nowrap; }
    .hanzel-logo span { display:inline-block; background:linear-gradient(90deg,var(--bugambilia-neon),var(--rosa-electrico),var(--naranja-volcanico)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:glow 1.5s infinite alternate, float var(--duration) infinite; animation-delay:var(--delay); }

    .est { position:absolute; bottom:2vh; left:50%; transform:translateX(-50%); color:var(--dorado-luznegra); font-size:1.2rem; font-weight:bold; opacity:0.8; text-shadow:0 0 10px rgba(255,215,0,0.5); }
    .chi-rho { position:absolute; bottom:1vh; right:1vw; font-size:1.2rem; color:var(--dorado-luznegra); opacity:0.7; text-shadow:0 0 15px var(--bugambilia-neon),0 0 30px var(--rosa-electrico); animation:glow 3s infinite alternate; }
    .vertical-menu { position:absolute; right:5vw; bottom:11vh; list-style:none; display:flex; flex-direction:column; gap:2.5rem; }
    .vertical-menu li { font-family:'Cinzel',serif; font-size:1.65rem; color:var(--dorado-luznegra); text-transform:uppercase; letter-spacing:6px; cursor:pointer; opacity:0.75; transition:all .4s cubic-bezier(0.23,1,0.32,1.275); }
    .vertical-menu li:hover { color:var(--turquesa-cenote); text-shadow:0 0 40px var(--turquesa-cenote); transform:translateX(20px) scale(1.1); }

    .palette-button { position:absolute; top:2vh; right:2vw; width:50px; height:50px; border-radius:50%; background:var(--ultravioleta-cosmico); border:2px solid var(--rosa-electrico); cursor:pointer; z-index:25; transition:all .3s; color:var(--dorado-luznegra); font-size:1.5rem; display:flex; align-items:center; justify-content:center; }
    .palette-button:hover { background:var(--rosa-electrico); border-color:var(--turquesa-cenote); color:var(--turquesa-cenote); transform:scale(1.1); }

    /* Guestbook y Music Player */
    .guestbook, .music-player-modal { 
      position:fixed; top:9vh; left:50%; transform:translateX(-50%) translateY(40px); 
      width:380px; max-height:80vh; overflow-y:auto; 
      background:rgba(11,0,20,0.95); border:2px solid var(--bugambilia-neon); 
      border-radius:20px; padding:2.5rem 2rem 2rem; 
      box-shadow:0 0 60px var(--rosa-electrico), inset 0 0 40px rgba(193,59,255,0.15); 
      z-index:10000; color:var(--verde-acido); opacity:0; visibility:hidden; 
      transition:all .65s cubic-bezier(0.175,0.885,0.32,1.275); 
    }
    .guestbook.active, .music-player-modal.active { opacity:1; visibility:visible; transform:translateX(-50%) translateY(0); }

    .close-btn { 
      position:absolute; top:1.2rem; right:1.2rem; width:42px; height:42px; 
      background:transparent; border:2px solid var(--rosa-electrico); color:var(--rosa-electrico); 
      font-size:2rem; line-height:38px; border-radius:50%; display:flex; 
      align-items:center; justify-content:center; cursor:pointer; transition:all .4s; 
    }
    .close-btn:hover { background:var(--rosa-electrico); color:var(--ultravioleta-cosmico); transform:rotate(90deg) scale(1.15); }

    .music-player-modal .album-thumbnail { display:block; margin:0 auto 1rem; width:180px; height:180px; border-radius:10px; box-shadow:0 0 20px var(--bugambilia-neon); object-fit:cover; }
    .music-player-modal .album-info { text-align:center; font-style:italic; color:var(--rosa-electrico); font-size:1.2rem; margin-bottom:0.8rem; }
    .music-player-modal .album-selector { display:flex; flex-direction:column; gap:0.6rem; margin-bottom:1.2rem; }
    .music-player-modal .album-option { 
      background:rgba(11,0,20,0.75); border:2px solid var(--bugambilia-neon); 
      color:var(--dorado-luznegra); padding:0.7rem 1.2rem; border-radius:10px; 
      cursor:pointer; font-family:'Cinzel',serif; font-size:1.05rem; 
      text-align:center; transition:all .3s; text-transform: lowercase;
    }
    .music-player-modal .album-option:hover { border-color:var(--turquesa-cenote); color:var(--turquesa-cenote); }
    .music-player-modal .album-option.active { 
      background:linear-gradient(90deg,var(--bugambilia-neon),var(--rosa-electrico)); 
      border-color:var(--rosa-electrico); color:var(--dorado-luznegra); 
    }
    .music-player-modal .song-list li .download-link { color: var(--naranja-volcanico); font-size: 1.2rem; margin-left: 0.5rem; }
    .music-player-modal .song-list li .download-link:hover { color: var(--turquesa-cenote); }

    /* Mobile */
    @media (max-width: 768px) {
      .blob { width:170px; height:170px; filter: blur(28px); opacity:0.85; }
      .blob:nth-child(n+7) { display:none; }
      .hanzel-logo { font-size: clamp(3.8rem, 15vw, 6rem); }
      .vertical-menu { bottom:15vh; right:6vw; gap:2rem; }
      .guestbook, .music-player-modal { width:92vw; max-width:420px; padding:2rem 1.8rem 1.8rem; }
      .music-player-modal .album-thumbnail { width:140px; height:140px; }
    }

    @keyframes glow { from{text-shadow:0 0 20px var(--dorado-luznegra),0 0 40px var(--bugambilia-neon)} to{text-shadow:0 0 40px var(--dorado-luznegra),0 0 80px var(--bugambilia-neon)} }
    @keyframes float { 0%,100%{transform:translateY(0)scale(1)} 50%{transform:translateY(-8px)scale(1.02)} }
  </style>
</head>

  <button id="palette-toggle" class="palette-button"><i class="fas fa-palette"></i></button>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      const trail = document.createElement('div');
      trail.className = 'cursor-trail';
      trail.style.left = e.clientX + 'px';
      trail.style.top = e.clientY + 'px';
      trail.style.background = `radial-gradient(circle, ${['#C13BFF','#FF2E98','#FF4F00','#00FF99','#00F0FF'][Math.floor(Math.random()*5)]}, transparent)`;
      document.body.appendChild(trail);
      setTimeout(() => trail.remove(), 1200);
    });
    document.querySelectorAll('button, li, a').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
    document.addEventListener('mousedown', () => cursor.classList.add('click'));
    document.addEventListener('mouseup', () => cursor.classList.remove('click'));

    // Logo animado
    const logo = document.querySelector('.hanzel-logo');
    const text = logo.textContent;
    logo.innerHTML = '';
    const durations = [5,6,4.5,5.5,4,6];
    const delays = [0,0.1,0.2,0.05,0.15,0.25];
    text.split('').forEach((char,i) => {
      const span = document.createElement('span');
      span.textContent = char;
      span.style.setProperty('--duration', `${durations[i]}s`);
      span.style.setProperty('--delay', `${delays[i]}s`);
      logo.appendChild(span);
    });

    // Paleta
    const paletteToggle = document.getElementById('palette-toggle');
    let currentPalette = 'kantoamere';
    paletteToggle.addEventListener('click', () => {
      if (currentPalette === 'kantoamere') {
        document.body.classList.remove('palette-kantoamere');
        document.body.classList.add('palette-16rosas');
        currentPalette = '16rosas';
      } else if (currentPalette === '16rosas') {
        document.body.classList.remove('palette-16rosas');
        document.body.classList.add('palette-zlooshee');
        currentPalette = 'zlooshee';
      } else {
        document.body.classList.remove('palette-zlooshee');
        document.body.classList.add('palette-kantoamere');
        currentPalette = 'kantoamere';
      }
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD84RLER1Z0z3YX0XnBvFEu0WLIw3frGro",
      authDomain: "hanzelconzeta-bd17b.firebaseapp.com",
      projectId: "hanzelconzeta-bd17b",
      storageBucket: "hanzelconzeta-bd17b.firebasestorage.app",
      messagingSenderId: "855182658974",
      appId: "1:855182658974:web:7dede44a589105053c1a8f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const albums = [
      {
        title: "16 rosas y algo llamado amor (2006)",
        cover: "https://hanzelconzeta.github.io/portadarosas.JPG",
        songs: [
          { title: 'primer acto', src: 'https://hanzelconzeta.github.io/primer_acto.mp3', duration: '3:45' },
          { title: 'me hiciste creer', src: 'https://hanzelconzeta.github.io/me_hiciste_creer.mp3', duration: '4:12' },
          { title: 'te entrego hoy', src: 'https://hanzelconzeta.github.io/te_entrego_hoy.mp3', duration: '3:30' },
          { title: 'montaña rusa', src: 'https://hanzelconzeta.github.io/montana_rusa.mp3', duration: '4:05' },
          { title: 'sin identidad', src: 'https://hanzelconzeta.github.io/sin_identidad.mp3', duration: '3:50' },
          { title: 'la gloria #109 (27 de mayo)', src: 'https://hanzelconzeta.github.io/la_gloria.mp3', duration: '4:20' },
          { title: 'que dificil seria verte partir', src: 'https://hanzelconzeta.github.io/que_dificil_seria_verte_partir.mp3', duration: '5:10' }
        ]
      },
      {
        title: "kanto amere (2007)",
        cover: "https://hanzelconzeta.github.io/kanto_portada.jpg",
        songs: [
          { title: 'los mejores romances', src: 'https://hanzelconzeta.github.io/los_mejores_romances.mp3', duration: '1:14' },
          { title: 'siempre terminan en tragedia', src: 'https://hanzelconzeta.github.io/siempre_terminan_en_tragedia.mp3', duration: '4:24' },
          { title: 'si no es hoy, mañana...', src: 'https://hanzelconzeta.github.io/si_no_es_hoy.mp3', duration: '5:30' },
          { title: 'carta a sally', src: 'https://hanzelconzeta.github.io/carta_a_sally.mp3', duration: '4:40' },
          { title: 'al final del arcoiris', src: 'https://hanzelconzeta.github.io/al_final_del_arcoiris.mp3', duration: '4:41' },
          { title: 'suelo mirar al cielo cuando pienso en ti', src: 'https://hanzelconzeta.github.io/suelo_mirar_al_cielo_cuando_pienso_en_ti.mp3', duration: '5:35' }
        ]
      }
    ];

    let currentAlbumIndex = 0;
    let currentSongIndex = 0;
    const audio = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const songTitle = document.getElementById('song-title');
    const songList = document.getElementById('song-list');
    const musicPlayerModal = document.getElementById('music-player-modal');
    const albumCover = document.getElementById('album-cover');
    const albumTitleEl = document.getElementById('album-title');
    const option0 = document.getElementById('option-0');
    const option1 = document.getElementById('option-1');

    function switchAlbum(index) {
      currentAlbumIndex = index;
      option0.classList.toggle('active', index === 0);
      option1.classList.toggle('active', index === 1);
      const album = albums[index];
      albumTitleEl.textContent = album.title;
      albumCover.src = album.cover;
      populateSongList();
      loadSong(0);
    }

    function loadSong(i) {
      currentSongIndex = i;
      audio.src = albums[currentAlbumIndex].songs[i].src;
      songTitle.textContent = albums[currentAlbumIndex].songs[i].title;
      audio.load();
      audio.play().catch(() => {});
      playPauseBtn.textContent = '❚❚';
      document.querySelectorAll('.song-list li').forEach((li, idx) => li.classList.toggle('active', idx === i));
    }

    function populateSongList() {
      songList.innerHTML = '';
      const hasCommented = localStorage.getItem('hasCommented') === 'true';
      const currentAlbum = albums[currentAlbumIndex];
      currentAlbum.songs.forEach((song, i) => {
        const li = document.createElement('li');
        let downloadLink = '';
        if (hasCommented) {
          downloadLink = ` <a href="${song.src}" download class="download-link"><i class="fas fa-download"></i></a>`;
        }
        li.innerHTML = `<span>${i + 1}. ${song.title}</span><span>${song.duration}${downloadLink}</span>`;
        li.addEventListener('click', () => loadSong(i));
        songList.appendChild(li);
      });

      const downloadAlbum = document.getElementById('download-album');
      if (hasCommented) {
        downloadAlbum.innerHTML = '<p style="text-align:center; color:var(--verde-acido);">Descargas individuales habilitadas ↓</p>';
      } else {
        downloadAlbum.innerHTML = '<p style="text-align:center; color:var(--rosa-electrico);">Deja un comentario en el guestbook para descargar las canciones</p>';
      }
    }

    playPauseBtn.addEventListener('click', () => {
      if (audio.paused) { audio.play(); playPauseBtn.textContent = '❚❚'; }
      else { audio.pause(); playPauseBtn.textContent = '▶'; }
    });
    prevBtn.addEventListener('click', () => loadSong((currentSongIndex - 1 + albums[currentAlbumIndex].songs.length) % albums[currentAlbumIndex].songs.length));
    nextBtn.addEventListener('click', () => loadSong((currentSongIndex + 1) % albums[currentAlbumIndex].songs.length));
    audio.addEventListener('ended', () => nextBtn.click());

    populateSongList();
    loadSong(0);

    option0.addEventListener('click', () => switchAlbum(0));
    option1.addEventListener('click', () => switchAlbum(1));

    document.getElementById('music-link').addEventListener('click', () => { 
      musicPlayerModal.classList.add('active'); 
      populateSongList(); 
    });
    document.getElementById('close-music-player').addEventListener('click', () => musicPlayerModal.classList.remove('active'));

    document.addEventListener('click', e => {
      if (musicPlayerModal.classList.contains('active') && !musicPlayerModal.contains(e.target) && e.target.id !== 'music-link') {
        musicPlayerModal.classList.remove('active');
      }
    });

    // Guestbook
    const guestbook = document.getElementById('guestbook');
    document.getElementById('guestbook-link').addEventListener('click', () => { 
      guestbook.classList.add('active'); 
      loadComments(); 
    });
    document.getElementById('close-guestbook').addEventListener('click', () => guestbook.classList.remove('active'));

    document.addEventListener('click', e => {
      if (guestbook.classList.contains('active') && !guestbook.contains(e.target) && e.target.id !== 'guestbook-link') {
        guestbook.classList.remove('active');
      }
    });

    document.getElementById('guestbook-form').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const message = document.getElementById('message').value.trim();
      if (!name || !message) return;
      try {
        await addDoc(collection(db, 'comments'), { name, message, timestamp: serverTimestamp() });
        alert('¡Gracias por firmar el guestbook!');
        document.getElementById('guestbook-form').reset();
        localStorage.setItem('hasCommented', 'true');
        loadComments();
        if (musicPlayerModal.classList.contains('active')) populateSongList();
      } catch(err) { alert('Error al enviar'); }
    });

    async function loadComments() {
      const list = document.getElementById('comments-list');
      list.innerHTML = '<p style="text-align:center;opacity:0.6;">Cargando...</p>';
      const q = query(collection(db, 'comments'), orderBy('timestamp', 'desc'));
      const snapshot = await getDocs(q);
      list.innerHTML = '';
      snapshot.forEach(doc => {
        const d = doc.data();
        const date = d.timestamp ? d.timestamp.toDate().toLocaleDateString('es-MX') : '';
        const div = document.createElement('div');
        div.className = 'comment';
        div.innerHTML = `<span class="author">${d.name}</span><p>${d.message}</p><span class="date">${date}</span>`;
        list.appendChild(div);
      });
      if (snapshot.empty) list.innerHTML = '<p style="text-align:center;opacity:0.6;">Sé el primero ✨</p>';
    }
  </script>
</body>
</html>
